<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 13px;
      color: #e0e0e0;
      background: #1e1e2e;
      padding: 16px;
    }
    h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #cdd6f4;
    }
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.connected { background: #a6e3a1; }
    .status-dot.disconnected { background: #f38ba8; }
    .status-dot.unknown { background: #f9e2af; }
    .stats {
      background: #313244;
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 12px;
      font-size: 12px;
      line-height: 1.6;
    }
    .stats span { color: #89b4fa; font-weight: 500; }
    h2 {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #cdd6f4;
    }
    .blocklist-section {
      background: #313244;
      border-radius: 6px;
      padding: 10px 12px;
    }
    .blocklist-input {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
    }
    .blocklist-input input {
      flex: 1;
      background: #45475a;
      border: 1px solid #585b70;
      border-radius: 4px;
      color: #cdd6f4;
      padding: 4px 8px;
      font-size: 12px;
      outline: none;
    }
    .blocklist-input input:focus {
      border-color: #89b4fa;
    }
    .blocklist-input button {
      background: #89b4fa;
      border: none;
      border-radius: 4px;
      color: #1e1e2e;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .blocklist-input button:hover { background: #74c7ec; }
    .blocklist-items {
      max-height: 150px;
      overflow-y: auto;
    }
    .blocklist-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 3px 0;
      font-size: 12px;
      color: #bac2de;
    }
    .blocklist-item button {
      background: none;
      border: none;
      color: #f38ba8;
      cursor: pointer;
      font-size: 12px;
      padding: 0 2px;
    }
    .blocklist-item button:hover { color: #eba0ac; }
    .empty-msg {
      color: #6c7086;
      font-size: 11px;
      font-style: italic;
    }
  </style>
</head>
<body>
  <h1>Sigil</h1>

  <div class="status-row">
    <div id="status-dot" class="status-dot unknown"></div>
    <span id="status-text">Checking...</span>
  </div>

  <div class="stats">
    Events sent: <span id="events-sent">0</span><br />
    Events dropped: <span id="events-dropped">0</span>
  </div>

  <h2>Blocked Domains</h2>
  <div class="blocklist-section">
    <div class="blocklist-input">
      <input type="text" id="domain-input" placeholder="example.com or *.example.com" />
      <button id="add-btn">Add</button>
    </div>
    <div id="blocklist-items" class="blocklist-items">
      <div class="empty-msg">No blocked domains</div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
