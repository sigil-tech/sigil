# Development config — run sigild locally on WSL2
# Usage: make run
# API key: export SIGIL_CLOUD_API_KEY=sk-ant-...

[daemon]
log_level = "debug"
watch_dirs = ["~/workspace"]
repo_dirs = ["~/workspace/sigil", "~/workspace/sigil-os", "~/workspace/spec-kit"]

[notifier]
level = 0  # silent — WSL2 has no notify-send; query with: ./sigilctl suggestions

[inference]
mode = "remote"

[inference.cloud]
enabled = true
provider = "anthropic"
model = "claude-sonnet-4-20250514"
# API key loaded from SIGIL_CLOUD_API_KEY env var

[schedule]
analyze_every = "5m"  # faster cycles for dev

[store]
# Default: ~/.local/share/sigild/data.db
